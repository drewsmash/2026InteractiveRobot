<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RT59 | Viewing System</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            margin: 0; padding: 0; font-family: monospace; background-color: #11151C; color: #e0e0e0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }
        header { 
            background: #1A212D; padding: 15px 25px; display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; border-bottom: 2px solid #FFD700; flex-shrink: 0; 
        }
        .header-logo { height: 35px; width: auto; }
        .ramtech-logo { height: 75px; width: auto; }
        .robot-selector { background: #1A212D; color: #FFD700; border: 2px solid #FFD700; padding: 6px; border-radius: 6px; cursor: pointer; }
        
        .btn-spin { background: transparent; color: #FFD700; border: 2px solid #FFD700; padding: 8px 18px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .btn-spin.active-mode { background: #00ff88; color: #11151C; border-color: #00ff88; }

        #main-content { flex: 1; position: relative; display: flex; overflow: hidden; }
        #viewer, #viewer-3d { flex: 1; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

        /* Restored Standard Sizing */
        .vr { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #viewer img, .vr img { max-width: 95%; max-height: 95%; object-fit: contain; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8)); }

        .side-panel { 
            position: absolute; top: 20px; bottom: 20px; width: 280px; background: rgba(26, 33, 45, 0.9); 
            border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 8px; padding: 20px; overflow-y: auto; z-index: 5;
        }
        .left-panel { left: 20px; } .right-panel { right: 20px; }
        .side-panel h2 { color: #FFD700; border-bottom: 1px solid #FFD700; padding-bottom: 5px; }

        .model-nav { background: #1A212D; padding: 15px; display: flex; gap: 15px; justify-content: center; border-top: 1px solid #FFD700; }
        .nav-btn { background: #2A3441; color: #A0B0C0; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .nav-btn.active { background: #0078d7; color: white; }

        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #11151C; z-index: 100; display: flex; justify-content: center; align-items: center; }
        .progress-bar-container { width: 300px; height: 6px; background: #1A212D; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; width: 0%; background: #00ff88; transition: width 0.1s; }

        @media (max-width: 768px) {
            .side-panel { display: none; } /* Mobile hides panels by default for now */
            header { grid-template-columns: 1fr; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img id="header-logo" src="Rico_logoSingleColorTrans.png" class="header-logo">
            <select id="robot-selector" class="robot-selector">
                <option value="2026_rico">2026 RICO</option>
                <option value="2025_offseason">2025 Offseason</option>
                <option value="2023_Robot">2023 Robot</option>
                <option value="3D_LIVE">LIVE 3D (BETA)</option>
            </select>
        </div>
        <div class="header-center"><img src="Ramtech_logo.png" class="ramtech-logo"></div>
        <div class="header-right">
            <button id="btn-hd-desktop" class="btn-spin">HD: OFF</button>
        </div>
    </header>

    <div id="main-content">
        <div id="viewer"></div>
        <div id="viewer-3d" style="display: none;"></div>

        <div id="loading-screen" style="display: none;">
            <div style="text-align: center;">
                <div id="progress-text" style="color: #00a8ff; font-weight: bold;">LOADING...</div>
                <div class="progress-bar-container"><div id="progress-fill" class="progress-fill"></div></div>
            </div>
        </div>

        <div class="side-panel left-panel">
            <h2 id="panel-title">Main Assembly</h2>
            <div id="panel-left-content"></div>
        </div>
        <div class="side-panel right-panel">
            <h2>Technical Specs</h2>
            <div id="panel-right-content"></div>
        </div>
    </div>

    <div class="model-nav" id="dynamic-nav-container"></div>

    <script src="js/prototype.js"></script>
    <script src="js/apple_core.js"></script>
    <script src="js/vr.js"></script>
    <script src="js/threesixty.js"></script>
    <script type="module" src="js/viewer.js"></script>
</body>
</html>
