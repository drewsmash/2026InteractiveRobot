<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RT59 | Viewing System</title>
    
    <style>
        /* =========================================
           CORE LAYOUT
           ========================================= */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: "SF Mono", "Monaco", "Andale Mono", "Ubuntu Mono", monospace;
            background-color: #11151C; 
            color: #e0e0e0;
            height: 100vh;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }
        
        /* =========================================
           HEADER STYLES (Fixed with CSS Grid)
           ========================================= */
        header { 
            background: #1A212D; 
            padding: 15px 25px; 
            /* Grid ensures the center stays dead-center while expanding to fit the logo */
            display: grid; 
            grid-template-columns: 1fr auto 1fr;
            align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            z-index: 10;
            flex-shrink: 0;
            border-bottom: 2px solid #FFD700; 
        }

        .header-left {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
        }

        .header-logo {
            height: 35px !important; 
            width: auto !important;
            max-width: 150px !important; 
            object-fit: contain;
        }

        .project-name { 
            margin: 0; 
            font-size: 1.3rem; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #FFD700; 
        }

        /* --- CENTER LOGO STYLES --- */
        .header-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ramtech-logo {
            height: 95px !important; 
            width: auto !important;
            max-width: 250px !important;
            object-fit: contain;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        /* Top Right Controls */
        .viewer-controls {
            display: flex;
            justify-content: flex-end;
        }

        .viewer-controls button { 
            font-family: inherit;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer; 
            border-radius: 4px; 
            transition: all 0.2s ease-in-out;
            outline: none;
            background: transparent;
            color: #FFD700;
            border: 2px solid #FFD700;
            padding: 8px 18px; 
            font-size: 0.8rem;
        }
        
        .viewer-controls button:hover { 
            background: #FFD700;
            color: #11151C;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* =========================================
           NAVIGATION BAR STYLES
           ========================================= */
        .model-nav { 
            background: #1A212D; 
            padding: 15px 20px; 
            display: flex; 
            gap: 20px; 
            justify-content: center;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; 
            box-shadow: 0 -4px 15px rgba(0,0,0,0.5);
            z-index: 10;
            flex-shrink: 0;
            border-top: 1px solid #FFD700; 
        }

        .model-nav::-webkit-scrollbar {
            height: 0px;
            background: transparent;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex-shrink: 0; 
        }

        .nav-label {
            font-size: 0.7rem;
            font-weight: bold;
            color: #FFD700;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .nav-item:has(.active) .nav-label {
            color: #00a8ff;
            text-shadow: 0 0 8px rgba(0, 168, 255, 0.4);
        }

        .nav-btn { 
            font-family: inherit;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer; 
            border-radius: 6px; 
            transition: all 0.2s ease-in-out;
            outline: none;
            background: #2A3441; 
            color: #A0B0C0;
            border: 2px solid transparent; 
            padding: 10px 25px; 
            font-size: 0.95rem;
            min-width: 120px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .nav-btn:hover { 
            background: #3B485A; 
            color: #fff;
        }
        
        .nav-btn.active { 
            background: #0078d7; 
            color: #ffffff;
            border-color: #00a8ff; 
            box-shadow: 0 0 15px rgba(0, 120, 215, 0.6);
            transform: translateY(-2px); 
        }

        .nav-logo {
            height: 20px !important;
            width: auto !important;
            max-width: 80px !important;
            object-fit: contain;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }
        
        .hidden { display: none !important; }

        /* =========================================
           VIEWER CORE STYLES
           ========================================= */
        #viewer { 
            flex: 1; 
            min-height: 0; 
            min-width: 0;
            position: relative; 
            width: 100%;
            overflow: hidden;
            display: flex; 
            justify-content: center;
            align-items: center;
            background-image: 
                linear-gradient(rgba(255, 215, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        #viewer > * {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .vr { 
            width: 100%; 
            height: 100%; 
            cursor: grab; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .vr:active { cursor: grabbing; }

        #viewer img, .vr img {
            max-width: 95% !important;
            max-height: 95% !important;
            width: auto !important;
            height: auto !important;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.8));
        }

        /* =========================================
           MOBILE RESPONSIVENESS
           ========================================= */
        @media (max-width: 768px) {
            header {
                /* Switches from Grid to Flexbox for vertical stacking on phones */
                display: flex;
                flex-direction: column;
                gap: 15px;
                padding: 15px 10px;
            }

            .header-center {
                order: -1; 
            }

            .header-left {
                justify-content: center;
            }

            .viewer-controls {
                justify-content: center;
            }

            .ramtech-logo {
                height: 45px !important;
            }

            .project-name { font-size: 1.1rem; }
            .header-logo { height: 28px !important; }

            .model-nav {
                padding: 12px 10px;
                justify-content: flex-start; 
                gap: 12px;
            }

            .nav-btn {
                padding: 8px 16px;
                font-size: 0.85rem;
                min-width: 100px;
            }
            .nav-logo { height: 16px !important; }
        }
    </style>
    
    <script src="js/prototype.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/browserdetect.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/apple_core.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/vr.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/library.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/threesixty.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/wheelzoom.js" type="text/javascript"></script>
    <script src="js/observers.js" type="text/javascript" defer></script>
    <script src="js/viewer.js" type="text/javascript" charset="utf-8" defer></script>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="Rico_logoSingleColorTrans.png" alt="RICO Logo" class="header-logo">
            <h1 class="project-name">RT59 | Viewing System</h1>
        </div>

        <div class="header-center">
            <img src="Ramtech_logo.png" alt="Ramtech Logo" class="ramtech-logo">
        </div>

    </header>

    <div id="viewer">
        </div>

    <div class="model-nav">
        
        <div class="nav-item">
            <span class="nav-label">Main Assembly</span>
            <button class="nav-btn active" data-model="Robot/images" data-frames="[30, 8]" data-invert="[false, false]">
                <img src="Rico_logoSingleColorTrans.png" alt="RICO" class="nav-logo">
            </button>
        </div>

        <div class="nav-item">
            <span class="nav-label">Shooter</span>
            <button class="nav-btn" data-model="Shooter/images" data-frames="[30, 8]" data-invert="[false, false]">Shooter</button>
        </div>

        <div class="nav-item">
            <span class="nav-label">Tunnel</span>
            <button class="nav-btn" data-model="Tunnel/images" data-frames="[30, 8]" data-invert="[false, false]">Tunnel</button>
        </div>

        <div class="nav-item">
            <span class="nav-label">Intake</span>
            <button class="nav-btn" data-model="Intake/images" data-frames="[30, 8]" data-invert="[false, false]">Intake</button>
        </div>

        <div class="nav-item">
            <span class="nav-label">Indexer</span>
            <button class="nav-btn" data-model="Indexer/images" data-frames="[30, 8]" data-invert="[false, false]">Indexer</button>
        </div>
        
        <div class="nav-item">
            <span class="nav-label">Swerve Wheel</span>
            <button class="nav-btn" data-model="Wheel/images" data-frames="[30, 8]" data-invert="[false, false]">Swerve Wheel</button>
        </div>

    </div>

</body>
</html>
