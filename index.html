<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 RT59 Interactive Robot Viewer</title>
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: "SF Mono", "Monaco", "Andale Mono", "Ubuntu Mono", monospace;
            background-color: #0B1528; 
            color: #e0e0e0;
            height: 100vh;
            /* iOS Safari fix for 100vh */
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }
        
        header { 
            background: #132540; 
            padding: 10px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            z-index: 10;
            flex-shrink: 0;
            border-bottom: 2px solid #FFD700; 
        }

        .project-name { 
            margin: 0; 
            font-size: 1.2rem; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #FFD700; 
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
            text-align: center;
        }

        .model-nav { 
            background: #132540; 
            padding: 15px; 
            display: flex; 
            gap: 12px; 
            justify-content: center;
            overflow-x: auto;
            /* Smooth scrolling for phones */
            -webkit-overflow-scrolling: touch; 
            box-shadow: 0 -4px 15px rgba(0,0,0,0.5);
            z-index: 10;
            flex-shrink: 0;
            border-top: 2px solid #FFD700; 
        }

        /* Hide scrollbar for the bottom nav but keep it scrollable */
        .model-nav::-webkit-scrollbar {
            height: 0px;
            background: transparent;
        }

        .viewer-controls button, .nav-btn {
            font-family: inherit;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer; 
            border-radius: 4px; 
            transition: all 0.2s ease-in-out;
            outline: none;
            white-space: nowrap; /* Prevents text inside buttons from wrapping */
        }

        .viewer-controls button { 
            background: transparent;
            color: #FFD700;
            border: 2px solid #FFD700;
            padding: 6px 15px; 
            font-size: 0.8rem;
        }
        
        .viewer-controls button:hover { 
            background: #FFD700;
            color: #0B1528;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .nav-btn { 
            background: #1D3459; 
            color: #A0B0C0;
            border: 2px solid transparent; 
            padding: 10px 20px; 
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        
        .nav-btn:hover { 
            background: #284675; 
            color: #fff;
        }
        
        .nav-btn.active { 
            background: #FFD700; 
            color: #0B1528;
            border-color: #FFF2A8; 
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            transform: translateY(-2px); 
        }
        
        .hidden { display: none !important; }

        #viewer { 
            flex-grow: 1; 
            position: relative; 
            width: 100%;
            overflow: hidden;
            display: grid; 
            place-items: center;
            background-image: 
                linear-gradient(rgba(255, 215, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        #viewer > * {
            grid-area: 1 / 1; 
        }

        .vr { 
            width: 100%; 
            height: 100%; 
            cursor: grab; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .vr:active { cursor: grabbing; }

        #viewer img, .vr img {
            /* Changed from vw/vh to % so it strictly obeys the #viewer container */
            max-width: 95%;
            max-height: 95%; 
            width: auto !important;
            height: auto !important;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.8));
        }

        /* =========================================
           MOBILE RESPONSIVENESS
           ========================================= */
        @media (max-width: 768px) {
            header {
                flex-direction: column; /* Stacks the title and button */
                gap: 12px;
                padding: 15px 10px;
            }

            .project-name {
                font-size: 1rem;
            }

            .model-nav {
                padding: 12px 10px;
                justify-content: flex-start; /* Aligns to left so user knows to swipe */
                gap: 8px;
            }

            .nav-btn {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
    
    <script src="js/prototype.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/browserdetect.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/apple_core.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/vr.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/library.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/threesixty.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/wheelzoom.js" type="text/javascript"></script>
    
    <script src="js/observers.js" type="text/javascript" defer></script>
    <script src="js/viewer.js" type="text/javascript" charset="utf-8" defer></script>
</head>
<body>

    <header>
        <h1 class="project-name">Viewing Full Robot</h1>
        <div class="viewer-controls">
            <button id="btn-actual">Actual Size</button>
            <button id="btn-fit" class="hidden">Fit to Screen</button>
        </div>
    </header>

    <div id="viewer">
    </div>

    <div class="model-nav">
        <button class="nav-btn active" data-model="Robot/images" data-frames="[30, 8]" data-invert="[false, false]">Robot</button>
        <button class="nav-btn" data-model="Shooter/images" data-frames="[30, 8]" data-invert="[false, false]">Shooter</button>
        <button class="nav-btn" data-model="Tunnel/images" data-frames="[30, 8]" data-invert="[false, false]">Tunnel</button>
        <button class="nav-btn" data-model="Intake/images" data-frames="[30, 8]" data-invert="[false, false]">Intake</button>
        <button class="nav-btn" data-model="Indexer/images" data-frames="[30, 8]" data-invert="[false, false]">Indexer</button>
    </div>

</body>
</html>
