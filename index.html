<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RT59 | Viewing System</title>
    
    <style>
        /* =========================================
           CORE LAYOUT
           ========================================= */
        body { 
            margin: 0; padding: 0; font-family: "SF Mono", "Monaco", "Andale Mono", "Ubuntu Mono", monospace;
            background-color: #11151C; color: #e0e0e0; height: 100vh; height: 100dvh; 
            display: flex; flex-direction: column; overflow: hidden; 
        }
        
        /* =========================================
           HEADER STYLES & DROPDOWN
           ========================================= */
        header { 
            background: #1A212D; padding: 15px 25px; display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.7); z-index: 10; flex-shrink: 0; border-bottom: 2px solid #FFD700; 
        }
        .header-left { display: flex; align-items: center; justify-content: flex-start; gap: 15px; flex-wrap: wrap; }
        .header-logo { height: 35px !important; width: auto !important; max-width: 150px !important; object-fit: contain; }
        
        .robot-selector {
            background: #1A212D; color: #FFD700; border: 2px solid #FFD700; padding: 6px 12px;
            border-radius: 6px; font-family: inherit; font-weight: 800; font-size: 1.1rem;
            text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.2s;
        }
        .robot-selector:hover, .robot-selector:focus { background: #FFD700; color: #11151C; }
        .robot-selector option { background: #1A212D; color: #e0e0e0; font-weight: bold; }
        
        .header-center { display: flex; align-items: center; justify-content: center; }
        .ramtech-logo { height: 100px !important; width: auto !important; max-width: 250px !important; object-fit: contain; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }

        .header-right { display: flex; justify-content: flex-end; align-items: center; }

        .viewer-controls button { 
            font-family: inherit; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; cursor: pointer; 
            border-radius: 4px; transition: all 0.2s ease-in-out; outline: none; background: transparent; color: #FFD700;
            border: 2px solid #FFD700; padding: 8px 18px; font-size: 0.8rem;
        }
        .viewer-controls button:hover { background: #FFD700; color: #11151C; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }

        .btn-spin.active-mode { background: #00ff88 !important; color: #11151C !important; border-color: #00ff88 !important; box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); }
        @media (min-width: 769px) { 
            #btn-spin-desktop::after { content: " (Space)"; font-size: 0.65rem; opacity: 0.7; margin-left: 5px; } 
            .mobile-floating-controls { display: none !important; }
        }

        /* =========================================
           NAVIGATION BAR STYLES
           ========================================= */
        .model-nav { 
            background: #1A212D; padding: 15px 20px; display: flex; gap: 20px; justify-content: center; overflow-x: auto;
            -webkit-overflow-scrolling: touch; box-shadow: 0 -4px 15px rgba(0,0,0,0.5); z-index: 10; flex-shrink: 0; border-top: 1px solid #FFD700; 
        }
        .model-nav::-webkit-scrollbar { height: 0px; background: transparent; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }
        .nav-label { font-size: 0.7rem; font-weight: bold; color: #FFD700; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
        .nav-item:has(.active) .nav-label { color: #00a8ff; text-shadow: 0 0 8px rgba(0, 168, 255, 0.4); }

        .nav-btn { 
            font-family: inherit; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; cursor: pointer; border-radius: 6px; 
            transition: all 0.2s ease-in-out; outline: none; background: #2A3441; color: #A0B0C0; border: 2px solid transparent; 
            padding: 10px 25px; font-size: 0.95rem; min-width: 120px; display: flex; justify-content: center; align-items: center;
        }
        .nav-btn:hover { background: #3B485A; color: #fff; }
        .nav-btn.active { background: #0078d7; color: #ffffff; border-color: #00a8ff; box-shadow: 0 0 15px rgba(0, 120, 215, 0.6); transform: translateY(-2px); }
        .nav-logo { height: 20px !important; width: auto !important; max-width: 80px !important; object-fit: contain; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); }

        /* =========================================
           VIEWER CORE
           ========================================= */
        #main-content { flex: 1; position: relative; min-height: 0; min-width: 0; width: 100%; display: flex; overflow: hidden; }

        #viewer { 
            flex: 1; position: relative; width: 100%; height: 100%; overflow: hidden; display: flex; justify-content: center; align-items: center;
            background-image: linear-gradient(rgba(255, 215, 0, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 215, 0, 0.03) 1px, transparent 1px); background-size: 50px 50px;
        }
        #viewer > * { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

        .vr { width: 100%; height: 100%; cursor: grab; display: flex; justify-content: center; align-items: center; }
        .vr:active { cursor: grabbing; }
        #viewer img, .vr img { max-width: 95% !important; max-height: 95% !important; width: auto !important; height: auto !important; object-fit: contain; user-select: none; -webkit-user-drag: none; filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.8)); }

        /* =========================================
           INFO OVERLAYS 
           ========================================= */
        .info-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; box-sizing: border-box; }
        .side-panel { box-sizing: border-box; pointer-events: auto; }
        .side-panel h2 { color: #FFD700; font-size: 1.1rem; margin-top: 0; border-bottom: 1px solid rgba(255, 215, 0, 0.3); padding-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .side-panel p { font-size: 0.85rem; line-height: 1.6; color: #A0B0C0; margin-bottom: 15px; }
        .side-panel ul { padding-left: 20px; font-size: 0.85rem; color: #e0e0e0; line-height: 1.6; }
        .side-panel li { margin-bottom: 10px; }
        .side-panel b { color: #00a8ff; } 

        @media (min-width: 769px) {
            .side-panel { position: absolute; top: 20px; bottom: 20px; width: 280px; background: rgba(26, 33, 45, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 8px; padding: 20px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
            .left-panel { left: 20px; } .right-panel { right: 20px; } #mobile-info-btn { display: none; }
        }

        /* =========================================
           MOBILE RESPONSIVENESS & DRAWER
           ========================================= */
        @media (max-width: 768px) {
            header { display: flex; flex-direction: column; gap: 15px; padding: 15px 10px; }
            .header-center { order: -1; margin-bottom: -5px; } .header-left, .header-right { justify-content: center; }
            .ramtech-logo { height: 45px !important; } .header-logo { height: 28px !important; }
            .robot-selector { font-size: 0.95rem; padding: 5px 10px; }
            .model-nav { padding: 12px 10px; justify-content: flex-start; gap: 12px; }
            .nav-btn { padding: 8px 16px; font-size: 0.85rem; min-width: 100px; } .nav-logo { height: 16px !important; }
            
            #btn-spin-desktop { display: none !important; }

            .info-overlay { background: rgba(17, 21, 28, 0.98); display: flex; flex-direction: column; z-index: 20; padding: 25px 20px; overflow-y: auto; pointer-events: auto; transform: translateY(100%); visibility: hidden; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.4s; }
            .info-overlay.open { transform: translateY(0); visibility: visible; }
            .side-panel { width: 100%; position: static; background: none; border: none; padding: 0; margin-bottom: 30px; box-shadow: none; }

            .mobile-floating-controls { position: absolute; bottom: 20px; right: 20px; z-index: 25; display: flex; gap: 10px; align-items: center; justify-content: flex-end; }
            .btn-spin, #mobile-info-btn { background: #0078d7; color: white; border: 2px solid #00a8ff; padding: 10px 18px; border-radius: 30px; font-weight: bold; font-family: inherit; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; box-shadow: 0 4px 15px rgba(0,0,0,0.7); cursor: pointer; transition: 0.2s; white-space: nowrap; }
            .btn-spin:active, #mobile-info-btn:active { transform: scale(0.95); }
        }
    </style>
    
    <script src="js/prototype.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/browserdetect.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/apple_core.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/vr.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/library.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/threesixty.js" type="text/javascript" charset="utf-8"></script>
    <script src="js/wheelzoom.js" type="text/javascript"></script>
    <script src="js/observers.js" type="text/javascript" defer></script>
</head>
<body>

    <header>
        <div class="header-left">
            <img id="header-logo" src="Rico_logoSingleColorTrans.png" alt="Robot Logo" class="header-logo">
            
            <select id="robot-selector" class="robot-selector">
                <option value="2026_rico">2026 RICO</option>
                <option value="2025_offseason">2025 Offseason</option>
            </select>
        </div>

        <div class="header-center">
            <img src="Ramtech_logo.png" alt="Ramtech Logo" class="ramtech-logo">
        </div>

        <div class="header-right viewer-controls">
            <button id="btn-spin-desktop" class="btn-spin">Auto-Spin: OFF</button>
        </div>
    </header>

    <div id="main-content">
        <div id="viewer"></div>

        <div id="info-overlay" class="info-overlay">
            <div class="side-panel left-panel">
                <h2 id="panel-title">Main Assembly</h2>
                <div id="panel-left-content"></div>
            </div>
            
            <div class="side-panel right-panel">
                <h2>Technical Specs</h2>
                <div id="panel-right-content"></div>
            </div>
        </div>

        <div class="mobile-floating-controls">
            <button id="btn-spin-mobile" class="btn-spin">Auto-Spin: OFF</button>
            <button id="mobile-info-btn">View Specs</button>
        </div>
    </div>

    <div class="model-nav" id="dynamic-nav-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // =========================================
            // 1. THE MULTI-YEAR ROBOT DATABASE
            // =========================================
            const robotDatabase = {
                "2026_rico": {
                    logo: "Rico_logoSingleColorTrans.png",
                    subsystems: [
                        { id: "Robot", label: "Main Assembly", path: "Robot/images", frames: [30, 8], useLogo: true },
                        { id: "Shooter", label: "Shooter", path: "Shooter/images", frames: [30, 8], useLogo: false },
                        { id: "Tunnel", label: "Tunnel", path: "Tunnel/images", frames: [30, 8], useLogo: false },
                        { id: "Intake", label: "Intake", path: "Intake/images", frames: [30, 8], useLogo: false },
                        { id: "Indexer", label: "Indexer", path: "Indexer/images", frames: [30, 8], useLogo: false },
                        { id: "Wheel", label: "Swerve Wheel", path: "Wheel/images", frames: [30, 8], useLogo: false }
                    ],
                    specs: {
                        "Robot": {
                            title: "RICO - Main Assembly",
                            leftContent: "<p>Rico's 21.5\" x 33\" chassis is rectangular when stowed, forming a perfect square when the intake is deployed to maximize storage capacity.</p><p>The battery is positioned opposite the turret to maintain a balanced center of gravity, utilizing vertical 1x1 tubes for unobstructed camera placement.</p>",
                            rightContent: "<ul><li><b>Chassis:</b> 1/8\" thick tubes & belly pan</li><li><b>Steering:</b> WCP X2S Swerve Modules</li><li><b>Deflectors:</b> 1/16\" polycarb plates</li><li><b>Cameras:</b> 4x ArduCam OV9281</li></ul>"
                        },
                        "Shooter": {
                            title: "Shooter & Turret",
                            leftContent: "<p>A flywheel mechanism capable of firing approximately 6 balls per second. A rotating turret provides independent horizontal aiming.</p><p>Adjustable hood and flywheel speeds control the launch angle and distance, improving accuracy from anywhere on the field without repositioning the drivetrain.</p>",
                            rightContent: "<ul><li><b>Turret Motor:</b> 1x Kraken X44 (52:1 Ratio)</li><li><b>Rotation:</b> 720° continuous via cable sleeve</li><li><b>Flywheel Motors:</b> 2x Kraken X60 (3:1 Ratio)</li><li><b>Flywheel:</b> 6\" aluminum with O-rings</li><li><b>Hood Range:</b> 41° (270:1 reduction)</li></ul>"
                        },
                        "Tunnel": {
                            title: "Tunnel & Tower",
                            leftContent: "<p>The tunnel collects fuel from the lower indexer section and organizes it into a single horizontal row to prevent jamming.</p><p>The tower then shifts the fuel from horizontal to vertical motion, launching it smoothly into the shooter assembly.</p>",
                            rightContent: "<ul><li><b>Tunnel Motor:</b> 1x Kraken X60</li><li><b>Tunnel System:</b> 3 belts moving at 20 ft/s</li><li><b>Tower Wheels:</b> 2x4\" and 4x2\" Stealth Wheels</li><li><b>Surface Speed:</b> Maintained at 20 ft/s throughout</li></ul>"
                        },
                        "Intake": {
                            title: "Intake Assembly",
                            leftContent: "<p>A single pivot mechanism designed to gather fuel from the floor immediately after contact to reduce chasing time.</p><p>The gear rack driven pivot allows for controlled deployment, agitation, and stowing within a 92° range of motion.</p>",
                            rightContent: "<ul><li><b>Pivot Motor:</b> 1x Kraken X44 (67:1 Ratio)</li><li><b>Roller Motors:</b> 2x Kraken X44</li><li><b>Rollers:</b> 2\" HDPE with CatTongue tape</li><li><b>Surface Speed:</b> 12.5 ft/s</li></ul>"
                        },
                        "Indexer": {
                            title: "Indexer Mechanism",
                            leftContent: "<p>The indexer transitions fuel from the intake to the tower using a series of downward-inclined, lightweight carbon fiber rods.</p><p>The roller bed pivots for maintenance access, while mecanum wheels act as agitators to guarantee streamlined fuel flow.</p>",
                            rightContent: "<ul><li><b>Roller Motors:</b> Shared with intake (2x Kraken X44)</li><li><b>Roller Speed:</b> 6.5 ft/s</li><li><b>Structure:</b> PET-CF brace blocks</li><li><b>Agitators:</b> Mecanum wheels</li></ul>"
                        },
                        "Wheel": {
                            title: "Swerve Drivetrain",
                            leftContent: "<p>Features WCP's X2S swerve modules for increased maneuverability and instantaneous directional changes to navigate around fuel easily.</p><p>The X1 Ratio set improves torque to reduce power consumption, paired with custom 3D printed treads to improve grip over the bump.</p>",
                            rightContent: "<ul><li><b>Module:</b> WCP X2S (Lightest in catalog)</li><li><b>Drive Motor:</b> 1x Kraken X60 per module</li><li><b>Steer Motor:</b> 1x Kraken X44 per module</li><li><b>Treads:</b> Custom 3D Printed</li></ul>"
                        }
                    }
                },
                "2025_offseason": {
                    logo: "Ramtech_logo.png", 
                    subsystems: [
                        { id: "Robot", label: "Main Assembly", path: "2025/Robot/images", frames: [30, 8], useLogo: false }
                    ],
                    specs: {
                        "Robot": {
                            title: "2025 Offseason Assembly",
                            leftContent: "<p>Placeholder text for the 2025 offseason robot.</p>",
                            rightContent: "<ul><li><b>Chassis:</b> TBD</li><li><b>Drive:</b> TBD</li></ul>"
                        }
                    }
                }
            };

            // =========================================
            // 2. DYNAMIC UI GENERATOR
            // =========================================
            const robotSelector = document.getElementById('robot-selector');
            const navContainer = document.getElementById('dynamic-nav-container');
            const headerLogo = document.getElementById('header-logo');

            function loadRobotProfile(robotKey) {
                const data = robotDatabase[robotKey];
                if (!data) return;

                if (data.logo) headerLogo.src = data.logo;
                navContainer.innerHTML = '';

                data.subsystems.forEach((sub) => {
                    const item = document.createElement('div');
                    item.className = 'nav-item';

                    const span = document.createElement('span');
                    span.className = 'nav-label';
                    span.textContent = sub.label;

                    const btn = document.createElement('button');
                    btn.className = 'nav-btn';
                    
                    if (sub.useLogo && data.logo) {
                        btn.innerHTML = `<img src="${data.logo}" class="nav-logo">`;
                    } else {
                        btn.textContent = sub.label;
                    }

                    btn.addEventListener('click', () => {
                        navContainer.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');

                        const specs = data.specs[sub.id] || { title: sub.label, leftContent: "Data coming soon.", rightContent: "" };
                        document.getElementById('panel-title').innerHTML = specs.title;
                        document.getElementById('panel-left-content').innerHTML = specs.leftContent;
                        document.getElementById('panel-right-content').innerHTML = specs.rightContent;

                        if (typeof threeSixty !== 'undefined' && threeSixty.loadModel) {
                            threeSixty.loadModel(sub.path, sub.frames, [false, false]);
                        }
                        if (autoSpinMode) resetIdleTimer();
                    });

                    item.appendChild(span);
                    item.appendChild(btn);
                    navContainer.appendChild(item);
                });

                const firstBtn = navContainer.querySelector('.nav-btn');
                if (firstBtn) firstBtn.click();
            }

            robotSelector.addEventListener('change', (e) => {
                loadRobotProfile(e.target.value);
            });

            // Initialize on load
            loadRobotProfile(robotSelector.value);

            // =========================================
            // 3. SAFE EXTERNAL AUTO-SPIN (No Engine Hacking!)
            // =========================================
            const spinBtns = document.querySelectorAll('.btn-spin');
            const viewerContainer = document.getElementById('viewer');
            
            let autoSpinMode = false; // OFF by default
            let spinLoop = null;
            let idleTimer = null;

            // This tells the VR engine to advance 1 frame safely from the outside
            function triggerSpinFrame() {
                if (typeof threeSixty !== 'undefined' && threeSixty._vr && !threeSixty._vr.grabbing) {
                    let pos = threeSixty._vr.currentPos;
                    // Moves the frame forward by 1
                    threeSixty._vr.gotoPos([pos[0] + 1, pos[1]]);
                }
            }

            function startSpinning() {
                if (autoSpinMode && !spinLoop) {
                    // 85ms is the "sweet spot" speed for smooth playback
                    spinLoop = setInterval(triggerSpinFrame, 85);
                }
            }

            function stopSpinning() {
                clearInterval(spinLoop);
                spinLoop = null;
            }

            function resetIdleTimer() {
                stopSpinning();
                clearTimeout(idleTimer);
                if (autoSpinMode) {
                    // Wait 4 seconds of idle time before spinning automatically
                    idleTimer = setTimeout(startSpinning, 4000);
                }
            }

            function toggleAutoSpinMode() {
                autoSpinMode = !autoSpinMode;
                
                spinBtns.forEach(btn => {
                    if (autoSpinMode) {
                        btn.classList.add('active-mode');
                        btn.textContent = 'Auto-Spin: ON';
                    } else {
                        btn.classList.remove('active-mode');
                        btn.textContent = 'Auto-Spin: OFF';
                    }
                });

                if (autoSpinMode) {
                    resetIdleTimer();
                } else {
                    stopSpinning();
                    clearTimeout(idleTimer);
                }
            }

            // Human Touch Detection (Pauses the spin temporarily)
            ['mousedown', 'touchstart', 'wheel'].forEach(evt => {
                viewerContainer.addEventListener(evt, (e) => {
                    if (e.isTrusted && autoSpinMode) {
                        resetIdleTimer();
                    }
                }, { passive: true, capture: true });
            });

            spinBtns.forEach(btn => btn.addEventListener('click', toggleAutoSpinMode));

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
                    e.preventDefault(); 
                    toggleAutoSpinMode();
                }
            });

            // =========================================
            // 4. MOBILE DRAWER TOGGLE
            // =========================================
            const toggleMobileBtn = document.getElementById('mobile-info-btn');
            const overlay = document.getElementById('info-overlay');

            if(toggleMobileBtn) {
                toggleMobileBtn.addEventListener('click', () => {
                    overlay.classList.toggle('open');
                    toggleMobileBtn.textContent = overlay.classList.contains('open') ? 'Close Specs' : 'View Specs';
                    
                    if(overlay.classList.contains('open')) {
                        toggleMobileBtn.style.background = '#FFD700';
                        toggleMobileBtn.style.color = '#11151C';
                    } else {
                        toggleMobileBtn.style.background = '#0078d7';
                        toggleMobileBtn.style.color = 'white';
                    }
                });
            }
        });
    </script>
</body>
</html>
